<!DOCTYPE html>
<html>
<head>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0ea5e9">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0ea5e9">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IQ Master</title>

<style>
body{
  margin:0;
  font-family:Arial;
  text-align:center;
  color:white;
  background: linear-gradient(135deg,#020617,#0ea5e9);
}
button{
  padding:14px;
  margin:6px;
  border:none;
  border-radius:10px;
  background:#0ea5e9;
  color:white;
  width:80%;
}
.screen{display:none;}
.active{display:block;}
</style>
</head>

<body>

<h1>🧠 IQ Master</h1>

<div id="menu" class="screen active">
  <button onclick="startGame('mcq')">📘 MCQ</button>
  <button onclick="startGame('typing')">⌨️ Typing</button>
  <button onclick="start1v1()">⚔️ 1v1</button>
  <button onclick="startMemory()">🎮 Memory Game</button>
  <button onclick="showLeaderboard()">🏆 Leaderboard</button>
</div>

<div id="game" class="screen">
  <h3 id="levelText"></h3>
  <div id="timer">10</div>
  <h2 id="question"></h2>
  <div id="answers"></div>
  <input id="inputAnswer" style="display:none">
  <button onclick="submitAnswer()">Submit</button>
</div>

<div id="memory" class="screen">
  <h2>Remember this:</h2>
  <h1 id="memoryNum"></h1>
  <input id="memoryInput" placeholder="Enter number">
  <button onclick="checkMemory()">Submit</button>
</div>

<div id="result" class="screen">
  <h2 id="scoreText"></h2>
  <button onclick="location.reload()">Restart</button>
</div>

<div id="leaderboard" class="screen">
  <h2>🏆 Top Players</h2>
  <div id="board"></div>
  <button onclick="goMenu()">Back</button>
</div>

<script>
let mode="",score=0,current=0,timeLeft=10,timer;
let enemyScore=0,is1v1=false;
let level=1;

const levels=["Easy","Normal","Hard","Genius","Einstein"];

const questions=[
{q:"2+2=?",a:"4",o:["3","4","5"]},
{q:"5×3=?",a:"15",o:["10","15","20"]},
{q:"Capital of France?",a:"Paris",o:["Rome","Paris","Berlin"]},
{q:"10/2=?",a:"5",o:["3","5","8"]},
{q:"9+10=?",a:"19",o:["19","21","18"]}
];

function startGame(m){
  mode=m;
  is1v1=false;
  start();
}

function start1v1(){
  is1v1=true;
  enemyScore=0;
  alert("Opponent found 🤖");
  start();
}

function start(){
  score=0;
  current=0;
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  let iq = 90 + score * 10;

let level = "Beginner";
if(iq > 140) level = "Einstein 🧠";
else if(iq > 120) level = "Genius";
else if(iq > 100) level = "Smart";

document.getElementById("scoreText").innerText =
  "Score: " + score +
  "\nIQ: " + iq +
  "\nLevel: " + level;
  loadQuestion();
}

function loadQuestion(){
  if(current>=questions.length){endGame();return;}

  document.getElementById("levelText").innerText="Level: "+levels[level-1];
  let q=questions[current];
  document.getElementById("question").innerText=q.q;

  let ansDiv=document.getElementById("answers");
  ansDiv.innerHTML="";

  if(mode==="mcq"){
    document.getElementById("inputAnswer").style.display="none";
    q.o.forEach(opt=>{
      let b=document.createElement("button");
      b.innerText=opt;
      b.onclick=()=>check(opt);
      ansDiv.appendChild(b);
    });
  } else {
    document.getElementById("inputAnswer").style.display="block";
  }

  startTimer();
}

function startTimer(){
  timeLeft=10;
  document.getElementById("timer").innerText=timeLeft;
  clearInterval(timer);
  timer=setInterval(()=>{
    timeLeft--;
    document.getElementById("timer").innerText=timeLeft;
    if(timeLeft<=0){current++;loadQuestion();}
  },1000);
}

function enemyMove(){
  if(is1v1 && Math.random()>0.5){enemyScore++;}
}

function check(ans){
  if(ans===questions[current].a){score++;}
  enemyMove();
  current++;
  loadQuestion();
}

function submitAnswer(){
  let val=document.getElementById("inputAnswer").value;
  if(val.toLowerCase()===questions[current].a.toLowerCase()){score++;}
  enemyMove();
  current++;
  loadQuestion();
}

function endGame(){
  clearInterval(timer);
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById("result").classList.add("active");

  let iq=90+score*10;
  let text="Score: "+score+" | IQ: "+iq;

  if(is1v1){
    let res="Draw 🤝";
    if(score>enemyScore) res="Win 🏆";
    if(score<enemyScore) res="Lose 😢";
    text+="\nOpponent: "+enemyScore+"\n"+res;
  }

  document.getElementById("scoreText").innerText=text;

  if(score>=4 && level<5) level++; // level up

  saveScore(score);
}

function startMemory(){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById("memory").classList.add("active");

  let num=Math.floor(Math.random()*900+100);
  window.memoryAnswer=num;
  document.getElementById("memoryNum").innerText=num;

  setTimeout(()=>{
    document.getElementById("memoryNum").innerText="???";
  },2000);
}

function checkMemory(){
  let val=document.getElementById("memoryInput").value;
  if(val==window.memoryAnswer){alert("Correct!");}
  else{alert("Wrong!");}
  goMenu();
}

function saveScore(s){
  let data=JSON.parse(localStorage.getItem("iq")||"[]");
  data.push({name:"Player"+Math.floor(Math.random()*1000),score:s});
  data.sort((a,b)=>b.score-a.score);
  data=data.slice(0,5);
  localStorage.setItem("iq",JSON.stringify(data));
}

function showLeaderboard(){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById("leaderboard").classList.add("active");

  let data=JSON.parse(localStorage.getItem("iq")||"[]");
  let board=document.getElementById("board");
  board.innerHTML="";
  data.forEach(p=>{
    board.innerHTML+="<p>"+p.name+" - "+p.score+"</p>";
  });
}

function goMenu(){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById("menu").classList.add("active");
}
</script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
</body>
</html>
