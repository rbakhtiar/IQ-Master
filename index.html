<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IQ Master</title>
<link rel="manifest" href="manifest.json">

<style>
body{
  margin:0;
  font-family:Arial;
  text-align:center;
  color:white;
  background:linear-gradient(135deg,#020617,#0ea5e9,#9333ea);
}
h1{margin:15px;}
button{
  padding:12px;margin:8px;border:none;border-radius:12px;
  width:80%;font-size:16px;background:#0ea5e9;color:white;
}
.screen{display:none;}
.active{display:block;}
.card{background:rgba(255,255,255,0.1);padding:10px;margin:10px;border-radius:12px;}
input{padding:10px;border:none;border-radius:8px;width:70%;}

/* Popup */
#popup{
  position:fixed;
  top:50%;left:50%;
  transform:translate(-50%,-50%) scale(0);
  padding:20px;
  border-radius:12px;
  font-weight:bold;
  opacity:0;
  transition:0.3s;
}
#popup.show{transform:translate(-50%,-50%) scale(1.2);opacity:1;}
.correct{background:#16a34a;}
.wrong{background:#dc2626;}
</style>
</head>

<body>

<h1>🧠 IQ Master</h1>

<div id="menu" class="screen active">
<button onclick="start('mcq')">MCQ</button>
<button onclick="start('typing')">Typing</button>
<button onclick="start('ai')">1v1 AI</button>

<div class="card">
Class:
<select id="class">
<option>1</option><option>2</option><option>3</option>
<option>4</option><option>5</option><option>6</option>
<option>7</option><option>8</option><option>9</option><option>10</option>
</select>

Difficulty:
<select id="diff">
<option>Super Easy</option>
<option>Easy</option>
<option>Medium</option>
<option>Hard</option>
<option>Einstein</option>
</select>
</div>
</div>

<div id="game" class="screen">
<h2 id="q"></h2>
<div id="ans"></div>
<input id="input" placeholder="Type..." style="display:none">
<button onclick="submit()">Submit</button>
</div>

<div id="popup"></div>

<script>
const qbank=[
{q:"2+2=?",a:"4",o:["3","4","5"]},
{q:"5x6=?",a:"30",o:["25","30","35"]},
{q:"Sun is a?",a:"Star",o:["Planet","Star","Moon"]},
{q:"10/2=?",a:"5",o:["2","5","8"]}
];

let mode,cur,score=0,ai=0;

function rand(){return qbank[Math.floor(Math.random()*qbank.length)];}

function start(m){
  mode=m;
  document.getElementById("menu").classList.remove("active");
  document.getElementById("game").classList.add("active");
  next();
}

function next(){
  cur=rand();
  document.getElementById("q").innerText=cur.q;
  let div=document.getElementById("ans");div.innerHTML="";
  if(mode==="typing"){
    document.getElementById("input").style.display="block";
  }else{
    document.getElementById("input").style.display="none";
    cur.o.forEach(o=>{
      let b=document.createElement("button");
      b.innerText=o;
      b.onclick=()=>check(o);
      div.appendChild(b);
    });
  }
}

function popup(msg,type){
  let p=document.getElementById("popup");
  p.innerText=msg;
  p.className=type+" show";
  setTimeout(()=>p.className=type,1500);
}

function check(a){
  if(a===cur.a){score++;popup("Correct","correct");}
  else{popup("Wrong: "+cur.a,"wrong");if(mode==="ai")ai++;}
  next();
}

function submit(){
  let v=document.getElementById("input").value;
  if(v.toLowerCase()===cur.a.toLowerCase()){
    score++;popup("Correct","correct");
  }else{
    popup("Wrong: "+cur.a,"wrong");
    if(mode==="ai")ai++;
  }
  next();
}

// SW
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
