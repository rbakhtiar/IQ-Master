<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#020617">
    <meta name="description" content="IQ Master - Brain Training Game: Math, GK, AI Battle, Leaderboard">
    <title>IQ Master • Brain Training</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0f2a 0%, #020617 40%, #0f172a 100%);
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            animation: bgPulse 12s ease infinite alternate;
        }

        @keyframes bgPulse {
            0% { background: linear-gradient(135deg, #0a0f2a, #020617, #0f172a); }
            100% { background: linear-gradient(225deg, #0b1120, #0a0f2a, #1e1b4b); }
        }

        .game-container {
            max-width: 700px;
            width: 100%;
            background: rgba(10, 20, 40, 0.45);
            backdrop-filter: blur(20px);
            border-radius: 80px;
            border: 1px solid rgba(56, 189, 248, 0.35);
            box-shadow: 0 30px 50px rgba(0,0,0,0.6), inset 0 1px 1px rgba(255,255,255,0.08);
            padding: 28px 24px 36px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .game-container:hover {
            transform: scale(1.01);
            box-shadow: 0 35px 55px rgba(0,0,0,0.7);
        }

        h1 {
            font-size: 2.3rem;
            background: linear-gradient(135deg, #ffffff, #a5f3fc, #c084fc, #f9a8d4);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: center;
            letter-spacing: -0.5px;
            margin-bottom: 6px;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }

        .screen {
            display: none;
            animation: floatFade 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        .active { display: block; }

        @keyframes floatFade {
            0% { opacity: 0; transform: translateY(20px) scale(0.98); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .card {
            background: rgba(255,255,255,0.04);
            border-radius: 56px;
            padding: 20px;
            margin: 20px 0;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(4px);
        }

        select, button, input {
            background: #0f172ad9;
            border: 1px solid #38bdf8;
            border-radius: 60px;
            padding: 12px 20px;
            font-size: 1rem;
            font-weight: 500;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            margin: 6px 8px;
            outline: none;
        }
        select:hover, button:hover, input:hover {
            border-color: #f0abfc;
            transform: translateY(-2px);
        }
        button:active { transform: scale(0.96); }

        button {
            background: linear-gradient(105deg, #0c4e6e, #0284c7);
            border: none;
            box-shadow: 0 6px 14px rgba(0,0,0,0.4);
        }

        .grid-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            justify-content: center;
            margin: 10px 0;
        }
        .grid-buttons button {
            flex: 1 1 40%;
            min-width: 140px;
            background: #1e293b;
            border-left: 4px solid #38bdf8;
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            background: #00000066;
            border-radius: 80px;
            padding: 12px 24px;
            margin-bottom: 20px;
            font-weight: bold;
            font-size: 1.2rem;
            backdrop-filter: blur(8px);
        }

        .question-card {
            background: linear-gradient(125deg, #0a0f1edd, #030614dd);
            border-radius: 60px;
            padding: 36px 16px;
            text-align: center;
            font-size: 1.9rem;
            font-weight: bold;
            margin: 20px 0;
            word-break: break-word;
            box-shadow: inset 0 1px 4px #ffffff1a, 0 15px 30px black;
            border: 1px solid rgba(56,189,248,0.4);
            color: white;
            text-shadow: 0 2px 3px rgba(0,0,0,0.3);
        }

        .answers-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            justify-content: center;
            margin: 20px 0;
        }
        .answers-grid button {
            flex: 1 1 42%;
            font-size: 1.2rem;
            background: #0f212e;
            transition: all 0.15s;
        }
        .answers-grid button:hover {
            background: #1e3a4a;
            transform: translateY(-3px);
        }

        #typingInput {
            width: 85%;
            text-align: center;
            font-size: 1.2rem;
            background: #0f172a;
            color: white;
        }

        #popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: #1e293b;
            padding: 16px 32px;
            border-radius: 80px;
            font-size: 1.7rem;
            font-weight: bold;
            color: white;
            z-index: 1000;
            transition: 0.2s cubic-bezier(0.34, 1.2, 0.64, 1);
            opacity: 0;
            text-align: center;
            box-shadow: 0 20px 35px black;
            pointer-events: none;
            white-space: nowrap;
        }
        #popup.correct { background: #10b981; text-shadow: 0 0 3px #059669; }
        #popup.wrong { background: #ef4444; }
        #popup.show { transform: translate(-50%, -50%) scale(1); opacity: 1; animation: bouncePop 0.4s ease; }
        @keyframes bouncePop {
            0% { transform: translate(-50%, -50%) scale(0.2); opacity: 0; }
            70% { transform: translate(-50%, -50%) scale(1.1); }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        .leaderboard-entry {
            background: #0f172a;
            margin: 12px 0;
            padding: 12px 20px;
            border-radius: 50px;
            display: flex;
            justify-content: space-between;
            border-left: 6px solid gold;
            transition: 0.1s;
        }
        .leaderboard-entry:hover {
            background: #1e293b;
            transform: translateX(5px);
        }
        .quit-btn {
            background: #4c1d95cc;
            margin-top: 12px;
        }
        footer {
            font-size: 0.7rem;
            text-align: center;
            margin-top: 25px;
            opacity: 0.5;
        }
    </style>
</head>
<body>
<div class="game-container">
    <h1>🧠 IQ MASTER</h1>

    <div id="menuScreen" class="screen active">
        <div class="card">
            <div>📚 Class: 
                <select id="classSelect">
                    <option>1</option><option>2</option><option>3</option><option>4</option><option>5</option>
                    <option>6</option><option>7</option><option>8</option><option>9</option><option>10</option>
                </select>
            </div>
            <div>🎯 Difficulty:
                <select id="difficultySelect">
                    <option>Super Easy</option><option>Easy</option><option>Medium</option><option>Hard</option><option>Einstein</option>
                </select>
            </div>
        </div>
        <div class="grid-buttons">
            <button onclick="game.start('mcq')">📘 MCQ Mode</button>
            <button onclick="game.start('typing')">⌨️ Typing Mode</button>
            <button onclick="game.start('infinite')">♾️ Infinite (no repeats)</button>
            <button onclick="game.start('ai')">🤖 1v1 AI Battle</button>
        </div>
        <button onclick="leaderboard.show()">🏆 Leaderboard</button>
        <footer>⚡ Install me | Offline ready</footer>
    </div>

    <div id="gameScreen" class="screen">
        <div class="game-header">
            <span>⭐ <span id="gameScore">0</span></span>
            <span>⏱️ <span id="gameTimer">10</span>s</span>
            <span id="aiBlock" style="display:none;">🤖 AI: <span id="aiScoreVal">0</span></span>
        </div>
        <div class="question-card" id="questionText">Loading...</div>
        <div id="answersArea" class="answers-grid"></div>
        <input type="text" id="typingInput" placeholder="Type your answer..." autocomplete="off">
        <div style="display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;">
            <button id="submitTypingBtn">✓ SUBMIT</button>
            <button class="quit-btn" onclick="game.quit()">🏠 MENU</button>
        </div>
        <div id="qCounter" style="margin-top: 18px; text-align: center; font-size: 0.85rem; background: #00000033; border-radius: 40px; padding: 8px;"></div>
    </div>

    <div id="resultScreen" class="screen">
        <h2>📊 GAME OVER</h2>
        <div id="resultMsg" style="font-size: 1.5rem; margin: 20px; text-align: center;"></div>
        <button onclick="game.resetToMenu()">🔄 PLAY AGAIN</button>
        <button onclick="leaderboard.show()">🏆 LEADERBOARD</button>
    </div>

    <div id="leaderboardScreen" class="screen">
        <h2>🏅 TOP SCORES</h2>
        <div id="leaderList"></div>
        <button onclick="leaderboard.back()">◀ BACK</button>
    </div>

    <div id="popup"></div>
</div>

<script>
    // ---------- MASTER QUESTION BANK (with plausible distractors for MCQ) ----------
    const masterQuestions = [
        { text: "5 + 3 = ?", answer: "8", topic: "math", minClass: 1, maxClass: 3, difficulty: "Super Easy", distractors: ["6", "7", "9"] },
        { text: "12 - 7 = ?", answer: "5", topic: "math", minClass: 1, maxClass: 3, difficulty: "Super Easy", distractors: ["4", "6", "7"] },
        { text: "4 × 6 = ?", answer: "24", topic: "math", minClass: 3, maxClass: 5, difficulty: "Easy", distractors: ["20", "22", "26"] },
        { text: "81 ÷ 9 = ?", answer: "9", topic: "math", minClass: 4, maxClass: 6, difficulty: "Easy", distractors: ["7", "8", "10"] },
        { text: "15% of 200 = ?", answer: "30", topic: "math", minClass: 6, maxClass: 8, difficulty: "Medium", distractors: ["25", "28", "35"] },
        { text: "x + 7 = 15, x = ?", answer: "8", topic: "math", minClass: 6, maxClass: 8, difficulty: "Medium", distractors: ["6", "7", "9"] },
        { text: "√144 = ?", answer: "12", topic: "math", minClass: 5, maxClass: 7, difficulty: "Medium", distractors: ["10", "11", "13"] },
        { text: "2³ × 3² = ?", answer: "72", topic: "math", minClass: 7, maxClass: 9, difficulty: "Hard", distractors: ["64", "68", "80"] },
        { text: "If 3x = 27, x = ?", answer: "9", topic: "math", minClass: 7, maxClass: 9, difficulty: "Hard", distractors: ["7", "8", "10"] },
        { text: "What is the derivative of x²?", answer: "2x", topic: "math", minClass: 9, maxClass: 10, difficulty: "Einstein", distractors: ["x", "2", "x²"] },
        { text: "Who wrote the Indian national anthem?", answer: "Tagore", topic: "gk", minClass: 3, maxClass: 10, difficulty: "Easy", distractors: ["Premchand", "Gandhi", "Nehru"] },
        { text: "Which planet is known as the Morning Star?", answer: "Venus", topic: "gk", minClass: 4, maxClass: 10, difficulty: "Easy", distractors: ["Mars", "Jupiter", "Mercury"] },
        { text: "Who painted the Mona Lisa?", answer: "Da Vinci", topic: "gk", minClass: 5, maxClass: 10, difficulty: "Medium", distractors: ["Van Gogh", "Picasso", "Rembrandt"] },
        { text: "What is the longest river in the world?", answer: "Nile", topic: "gk", minClass: 5, maxClass: 10, difficulty: "Medium", distractors: ["Amazon", "Yangtze", "Mississippi"] },
        { text: "Which country gifted the Statue of Liberty to the USA?", answer: "France", topic: "gk", minClass: 6, maxClass: 10, difficulty: "Hard", distractors: ["England", "Spain", "Germany"] },
        { text: "What gas do plants release during photosynthesis?", answer: "Oxygen", topic: "science", minClass: 3, maxClass: 10, difficulty: "Easy", distractors: ["Carbon dioxide", "Nitrogen", "Hydrogen"] },
        { text: "What is the hardest natural substance?", answer: "Diamond", topic: "science", minClass: 4, maxClass: 10, difficulty: "Easy", distractors: ["Gold", "Iron", "Platinum"] },
        { text: "What is the pH of pure water?", answer: "7", topic: "science", minClass: 6, maxClass: 10, difficulty: "Medium", distractors: ["5", "6", "8"] },
        { text: "Which organ pumps blood in the human body?", answer: "Heart", topic: "science", minClass: 3, maxClass: 10, difficulty: "Super Easy", distractors: ["Liver", "Brain", "Lungs"] },
        { text: "What is the chemical symbol for Gold?", answer: "Au", topic: "science", minClass: 6, maxClass: 10, difficulty: "Hard", distractors: ["Ag", "Fe", "Pb"] },
        { text: "What has keys but can't open locks?", answer: "Piano", topic: "logic", minClass: 2, maxClass: 10, difficulty: "Medium", distractors: ["Keyboard", "Door", "Chest"] },
        { text: "I speak without a mouth and hear without ears. Who am I?", answer: "Echo", topic: "logic", minClass: 4, maxClass: 10, difficulty: "Hard", distractors: ["Shadow", "Wind", "Mirror"] },
        { text: "What is the largest mammal on Earth?", answer: "Whale", topic: "gk", minClass: 2, maxClass: 10, difficulty: "Super Easy", distractors: ["Elephant", "Giraffe", "Hippo"] }
    ];

    // Dynamic math question generator (used when no static question fits or for variety)
    function generateDynamicMath(classLevel, difficulty) {
        let low = 1, high = 20, ops = ['+'];
        if (classLevel >= 7) high = 150;
        else if (classLevel >= 5) high = 100;
        else if (classLevel >= 3) high = 50;
        if (difficulty === "Super Easy") { ops = ['+']; low = 1; high = 20; }
        else if (difficulty === "Easy") { ops = ['+','-']; }
        else if (difficulty === "Medium") { ops = ['+','-','*']; high = Math.min(high+30, 200); }
        else if (difficulty === "Hard") { ops = ['+','-','*','/']; high = Math.min(high+70, 400); }
        else if (difficulty === "Einstein") { ops = ['*','/','^2']; high = 500; }
        
        let op = ops[Math.floor(Math.random() * ops.length)];
        let a = Math.floor(Math.random() * (high - low + 1) + low);
        let b = Math.floor(Math.random() * (high/2) + 1);
        let answer, text;
        if (op === '^2') {
            let base = Math.floor(Math.random() * 15 + 2);
            answer = String(base*base);
            text = `${base}² = ?`;
        } else if (op === '/') {
            b = Math.max(1,b);
            let product = a * b;
            answer = String(a);
            text = `${product} ÷ ${b} = ?`;
        } else if (op === '*') {
            answer = String(a*b);
            text = `${a} × ${b} = ?`;
        } else {
            let result = op === '+' ? a+b : a-b;
            if (result < 0) { let t=a; a=b; b=t; result = a-b; }
            answer = String(result);
            text = `${a} ${op} ${b} = ?`;
        }
        // generate numeric distractors
        let numAns = parseFloat(answer);
        let dist1 = isNaN(numAns) ? "??" : String(numAns + (Math.random() > 0.5 ? 1 : -1));
        let dist2 = isNaN(numAns) ? "???" : String(numAns + (Math.random() > 0.5 ? 2 : -2));
        if (dist1 === answer) dist1 = String(numAns + 1);
        if (dist2 === answer) dist2 = String(numAns - 1);
        return { text, answer: answer.toLowerCase(), options: [answer, dist1, dist2] };
    }

    function getFilteredStaticQuestions(classLvl, diff) {
        return masterQuestions.filter(q => 
            classLvl >= q.minClass && classLvl <= q.maxClass &&
            (q.difficulty === diff || (diff === "Einstein" && q.difficulty === "Hard"))
        );
    }

    // Smart option generation: use predefined distractors if available, else generate sensible ones
    function generateOptions(questionObj, correctAnswer) {
        if (questionObj.distractors && questionObj.distractors.length >= 2) {
            let opts = [correctAnswer, ...questionObj.distractors.slice(0,2)];
            opts.sort(() => Math.random() - 0.5);
            return opts;
        }
        // fallback: generate based on answer type
        let ans = correctAnswer;
        if (!isNaN(parseFloat(ans))) {
            let num = parseFloat(ans);
            let d1 = String(num + 1);
            let d2 = String(num - 1);
            if (d1 === ans) d1 = String(num + 2);
            if (d2 === ans) d2 = String(num - 2);
            let opts = [ans, d1, d2];
            opts.sort(() => Math.random() - 0.5);
            return opts;
        } else {
            // generic fallback (should rarely happen now)
            let fake = ["Alternative", "Option", "Wrong"];
            let opts = [ans, fake[0], fake[1]];
            opts.sort(() => Math.random() - 0.5);
            return opts;
        }
    }

    // GAME MANAGER
    const game = {
        mode: null,
        classLevel: 5,
        difficulty: "Medium",
        score: 0,
        aiScore: 0,
        qIndex: 0,
        totalRounds: 5,
        timer: null,
        timeLeft: 10,
        active: false,
        currentQuestion: null,
        usedQuestions: new Set(),
        staticPool: [],
        
        start(mode) {
            this.mode = mode;
            this.classLevel = parseInt(document.getElementById('classSelect').value);
            this.difficulty = document.getElementById('difficultySelect').value;
            this.score = 0;
            this.aiScore = 0;
            this.qIndex = 0;
            this.totalRounds = (mode === 'infinite') ? Infinity : 5;
            this.active = true;
            this.usedQuestions.clear();
            this.staticPool = getFilteredStaticQuestions(this.classLevel, this.difficulty);
            
            document.getElementById('gameScore').innerText = "0";
            document.getElementById('gameTimer').innerText = "10";
            const aiBlock = document.getElementById('aiBlock');
            if (mode === 'ai') {
                aiBlock.style.display = 'flex';
                document.getElementById('aiScoreVal').innerText = "0";
            } else aiBlock.style.display = 'none';
            
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('gameScreen').classList.add('active');
            document.getElementById('typingInput').style.display = (mode === 'typing') ? 'block' : 'none';
            document.getElementById('submitTypingBtn').style.display = (mode === 'typing') ? 'inline-block' : 'none';
            document.getElementById('answersArea').innerHTML = '';
            if (this.timer) clearInterval(this.timer);
            this.nextQuestion();
        },
        
        getNewQuestion() {
            let useDynamic = (Math.random() < 0.3) || (this.staticPool.length === 0);
            let q = null;
            if (useDynamic || this.staticPool.length === 0) {
                q = generateDynamicMath(this.classLevel, this.difficulty);
                q.answer = q.answer.toLowerCase();
                q.options = q.options; // already has options
            } else {
                let available = this.staticPool.filter(qq => !this.usedQuestions.has(qq.text));
                if (available.length === 0 && this.mode === 'infinite') {
                    this.usedQuestions.clear();
                    available = [...this.staticPool];
                }
                let picked = available.length ? available[Math.floor(Math.random() * available.length)] : this.staticPool[0];
                let correctAns = picked.answer;
                let opts = generateOptions(picked, correctAns);
                q = {
                    text: picked.text,
                    answer: correctAns.toLowerCase(),
                    options: opts,
                    distractors: picked.distractors
                };
                if (this.mode === 'infinite') this.usedQuestions.add(q.text);
            }
            // Ensure options exist for MCQ mode
            if (this.mode === 'mcq' && !q.options) {
                let fakeOpts = [q.answer, "alt1", "alt2"];
                fakeOpts.sort(() => Math.random() - 0.5);
                q.options = fakeOpts;
            }
            return q;
        },
        
        nextQuestion() {
            if (!this.active) return;
            if (this.mode !== 'infinite' && this.qIndex >= this.totalRounds) {
                this.endGame();
                return;
            }
            this.currentQuestion = this.getNewQuestion();
            document.getElementById('questionText').innerText = this.currentQuestion.text;
            const container = document.getElementById('answersArea');
            const typingInp = document.getElementById('typingInput');
            if (this.mode === 'mcq' && this.currentQuestion.options) {
                container.innerHTML = '';
                typingInp.style.display = 'none';
                document.getElementById('submitTypingBtn').style.display = 'none';
                this.currentQuestion.options.forEach(opt => {
                    let btn = document.createElement('button');
                    btn.innerText = opt;
                    btn.onclick = () => this.checkAnswer(opt);
                    container.appendChild(btn);
                });
            } else if (this.mode === 'typing') {
                container.innerHTML = '';
                typingInp.style.display = 'block';
                typingInp.value = '';
                typingInp.focus();
                document.getElementById('submitTypingBtn').style.display = 'inline-block';
                document.getElementById('submitTypingBtn').onclick = () => {
                    this.checkAnswer(typingInp.value.trim());
                };
            } else {
                container.innerHTML = '';
                typingInp.style.display = 'none';
                document.getElementById('submitTypingBtn').style.display = 'none';
                let opts = this.currentQuestion.options || [this.currentQuestion.answer, "Wrong1", "Wrong2"];
                opts.sort(() => Math.random() - 0.5);
                opts.forEach(opt => {
                    let btn = document.createElement('button');
                    btn.innerText = opt;
                    btn.onclick = () => this.checkAnswer(opt);
                    container.appendChild(btn);
                });
            }
            const counterText = (this.mode === 'infinite') ? `🔁 Round ${this.qIndex+1} (no repeats)` : `📌 Q${this.qIndex+1}/${this.totalRounds}`;
            document.getElementById('qCounter').innerHTML = counterText;
            this.startTimer();
        },
        
        startTimer() {
            if (this.timer) clearInterval(this.timer);
            this.timeLeft = 10;
            document.getElementById('gameTimer').innerText = this.timeLeft;
            this.timer = setInterval(() => {
                if (!this.active) return;
                this.timeLeft--;
                document.getElementById('gameTimer').innerText = this.timeLeft >= 0 ? this.timeLeft : 0;
                if (this.timeLeft <= 0) {
                    clearInterval(this.timer);
                    if (this.mode === 'ai') {
                        this.aiScore++;
                        document.getElementById('aiScoreVal').innerText = this.aiScore;
                    }
                    this.showPopup(`⏰ Timeout! Answer: ${this.currentQuestion.answer}`, 'wrong');
                    this.qIndex++;
                    this.updateUI();
                    this.nextQuestion();
                }
            }, 1000);
        },
        
        checkAnswer(userAns) {
            if (!this.active) return;
            clearInterval(this.timer);
            const isCorrect = (userAns.toLowerCase().trim() === this.currentQuestion.answer);
            if (isCorrect) {
                this.score++;
                this.showPopup("✅ Correct!", "correct");
            } else {
                if (this.mode === 'ai') {
                    this.aiScore++;
                    document.getElementById('aiScoreVal').innerText = this.aiScore;
                }
                this.showPopup(`❌ Wrong! Answer: ${this.currentQuestion.answer}`, "wrong");
            }
            this.qIndex++;
            this.updateUI();
            this.nextQuestion();
        },
        
        updateUI() {
            document.getElementById('gameScore').innerText = this.score;
            if (this.mode === 'ai') document.getElementById('aiScoreVal').innerText = this.aiScore;
        },
        
        endGame() {
            this.active = false;
            clearInterval(this.timer);
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('resultScreen').classList.add('active');
            let iq = Math.min(160, 80 + this.score * 12);
            let msg = `🧠 Score: ${this.score}  |  IQ: ${iq}`;
            if (this.mode === 'ai') {
                msg += `<br>🤖 AI: ${this.aiScore}  |  ${this.score > this.aiScore ? '🏆 YOU WIN!' : (this.score === this.aiScore ? '🤝 DRAW' : '💀 AI WINS')}`;
            }
            document.getElementById('resultMsg').innerHTML = msg;
            this.saveHighScore(this.score);
        },
        
        saveHighScore(score) {
            let scores = JSON.parse(localStorage.getItem('iqMasterScores')) || [];
            scores.push({ score: score, date: new Date().toLocaleDateString(), mode: this.mode });
            scores.sort((a,b) => b.score - a.score);
            scores = scores.slice(0, 8);
            localStorage.setItem('iqMasterScores', JSON.stringify(scores));
        },
        
        quit() {
            this.active = false;
            clearInterval(this.timer);
            this.resetToMenu();
        },
        
        resetToMenu() {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('menuScreen').classList.add('active');
        },
        
        showPopup(msg, type) {
            const pop = document.getElementById('popup');
            pop.innerText = msg;
            pop.className = type + ' show';
            setTimeout(() => pop.className = '', 1800);
        }
    };
    
    const leaderboard = {
        show() {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('leaderboardScreen').classList.add('active');
            const listDiv = document.getElementById('leaderList');
            let scores = JSON.parse(localStorage.getItem('iqMasterScores')) || [];
            if (!scores.length) {
                listDiv.innerHTML = '<div class="leaderboard-entry">✨ No scores yet. Play a game!</div>';
                return;
            }
            listDiv.innerHTML = '';
            scores.forEach((entry, idx) => {
                const div = document.createElement('div');
                div.className = 'leaderboard-entry';
                div.innerHTML = `<span>#${idx+1} ⭐ ${entry.score}</span><span>${entry.mode} • ${entry.date}</span>`;
                listDiv.appendChild(div);
            });
        },
        back() {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('menuScreen').classList.add('active');
        }
    };
    
    window.game = game;
    window.leaderboard = leaderboard;
    
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js').then(reg => console.log('✅ SW registered', reg)).catch(err => console.log('❌ SW fail', err));
        });
    }
</script>
</body>
</html>
