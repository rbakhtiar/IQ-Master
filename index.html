<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IQ Master</title>

<style>
body {
  margin:0;
  font-family:Arial;
  text-align:center;
  color:white;
  background: linear-gradient(135deg,#020617,#7c3aed);
}

h1 { margin-top:20px; }

button {
  padding:15px;
  margin:10px;
  border:none;
  border-radius:12px;
  background:#7c3aed;
  color:white;
  width:80%;
  font-size:16px;
}

.screen { display:none; }
.active { display:block; }

#timer { font-size:20px; }

input {
  padding:10px;
  width:70%;
  border-radius:8px;
  border:none;
}
</style>
</head>

<body>

<h1>🧠 IQ Master</h1>

<div id="menu" class="screen active">
  <button onclick="chooseMode('mcq')">MCQ Mode</button>
  <button onclick="chooseMode('typing')">Typing Mode</button>
  <button onclick="startMini()">Memory Game</button>
</div>

<div id="level" class="screen">
  <h2>Select Level</h2>
  <button onclick="startGame('easy')">Easy</button>
  <button onclick="startGame('medium')">Medium</button>
  <button onclick="startGame('hard')">Hard</button>
  <button onclick="startGame('einstein')">Einstein</button>
</div>

<div id="game" class="screen">
  <div id="timer">10</div>
  <h2 id="question"></h2>
  <div id="answers"></div>
  <input id="inputAnswer" placeholder="Type answer..." style="display:none">
  <br>
  <button onclick="submitAnswer()">Submit</button>
</div>

<div id="result" class="screen">
  <h2 id="resultText"></h2>
  <button onclick="location.reload()">Play Again</button>
</div>

<script>
let mode="", level="";
let score=0, current=0, timer, timeLeft=10;

let questionSets = {
easy:[
 {q:"2+2=?",a:"4",o:["3","4","5"]},
 {q:"3+5=?",a:"8",o:["6","8","9"]}
],
medium:[
 {q:"12×2=?",a:"24",o:["20","24","26"]},
 {q:"Capital of Italy?",a:"Rome",o:["Rome","Paris","Berlin"]}
],
hard:[
 {q:"√144=?",a:"12",o:["10","12","14"]},
 {q:"Force unit?",a:"Newton",o:["Joule","Newton","Watt"]}
],
einstein:[
 {q:"E=mc² relates to?",a:"energy",o:["mass","energy","force"]},
 {q:"Integral of x dx?",a:"x^2/2",o:["x^2","x^2/2","2x"]}
]
};

function chooseMode(m){
  mode=m;
  show("level");
}

function startGame(l){
  level=l;
  score=0;
  current=0;
  show("game");
  loadQ();
}

function loadQ(){
  let set=questionSets[level];
  if(current>=set.length){ endGame(); return; }

  let q=set[current];
  document.getElementById("question").innerText=q.q;
  let ansDiv=document.getElementById("answers");
  ansDiv.innerHTML="";

  if(mode==="mcq"){
    document.getElementById("inputAnswer").style.display="none";
    q.o.forEach(opt=>{
      let b=document.createElement("button");
      b.innerText=opt;
      b.onclick=()=>check(opt);
      ansDiv.appendChild(b);
    });
  } else {
    document.getElementById("inputAnswer").style.display="block";
  }

  startTimer();
}

function startTimer(){
  timeLeft=10;
  document.getElementById("timer").innerText=timeLeft;

  clearInterval(timer);
  timer=setInterval(()=>{
    timeLeft--;
    document.getElementById("timer").innerText=timeLeft;

    if(timeLeft<=0){
      current++;
      loadQ();
    }
  },1000);
}

function check(ans){
  if(ans===questionSets[level][current].a) score++;
  current++;
  loadQ();
}

function submitAnswer(){
  let val=document.getElementById("inputAnswer").value;
  if(val.toLowerCase()===questionSets[level][current].a.toLowerCase()) score++;
  current++;
  loadQ();
}

function endGame(){
  clearInterval(timer);
  let iq=90+score*15;

  let rank="Beginner";
  if(iq>140) rank="Einstein";
  else if(iq>120) rank="Genius";
  else if(iq>100) rank="Smart";

  document.getElementById("resultText").innerText=
  "Score: "+score+" | IQ: "+iq+" | "+rank;

  show("result");
}

function startMini(){
  let num=Math.floor(Math.random()*100);
  let guess=prompt("Remember this number: "+num);
  let ans=prompt("Enter it again:");
  if(ans==num) alert("Correct!");
  else alert("Wrong!");
}

function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}
</script>

</body>
</html>
