<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IQ Master</title>
  <link rel="manifest" href="manifest.json">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a, #020617, #1e1b4b);
      background-size: 200% 200%;
      animation: gradientFlow 15s ease infinite;
      font-family: 'Segoe UI', system-ui, 'Inter', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    @keyframes gradientFlow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .app {
      max-width: 650px;
      width: 100%;
      background: rgba(15, 23, 42, 0.9);
      border-radius: 56px;
      border: 1px solid rgba(56, 189, 248, 0.4);
      box-shadow: 0 25px 40px rgba(0, 0, 0, 0.5);
      padding: 28px 24px;
      transition: transform 0.2s ease;
    }

    .app:hover {
      transform: scale(1.01);
    }

    /* Gradient text: turquoise to blueish purple */
    h1, .question-card {
      background: linear-gradient(135deg, #40E0D0, #8A2BE2);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-align: center;
    }

    h1 {
      font-size: 2.3rem;
      margin-bottom: 20px;
    }

    .question-card {
      font-size: 1.9rem;
      font-weight: bold;
      margin: 20px 0;
      border: 1px solid #38bdf8;
      background-color: #0a0f1e; /* fallback */
      background: linear-gradient(135deg, #40E0D0, #8A2BE2);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      padding: 32px 16px;
      border-radius: 48px;
      box-shadow: inset 0 1px 2px rgba(255,255,255,0.1), 0 10px 20px rgba(0,0,0,0.3);
    }

    .screen {
      display: none;
      animation: fadeSlide 0.4s ease-out;
    }

    .active {
      display: block;
    }

    @keyframes fadeSlide {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 40px;
      padding: 20px;
      margin: 20px 0;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    select, button, input {
      background: #0f172a;
      border: 1px solid #38bdf8;
      border-radius: 60px;
      padding: 12px 20px;
      font-size: 1rem;
      font-weight: 500;
      color: white;
      cursor: pointer;
      transition: all 0.2s ease;
      margin: 6px;
      outline: none;
    }

    select:hover, button:hover, input:hover {
      border-color: #f0abfc;
      transform: translateY(-2px);
    }

    button:active {
      transform: scale(0.96);
    }

    button {
      background: linear-gradient(105deg, #0c4e6e, #0284c7);
      border: none;
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.3);
    }

    .grid {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      justify-content: center;
      margin: 15px 0;
    }

    .grid button {
      flex: 1 1 40%;
      min-width: 140px;
      background: #1e293b;
      border-left: 4px solid #38bdf8;
    }

    .game-header {
      display: flex;
      justify-content: space-between;
      background: rgba(0, 0, 0, 0.5);
      border-radius: 60px;
      padding: 12px 20px;
      margin-bottom: 20px;
      font-weight: bold;
      font-size: 1.2rem;
      color: white;
    }

    .answers {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      justify-content: center;
      margin: 20px 0;
    }

    .answers button {
      flex: 1 1 42%;
      font-size: 1.2rem;
      background: #0f212e;
    }

    .answers button:hover {
      background: #1e3a4a;
      transform: translateY(-3px);
    }

    #typingInput {
      width: 85%;
      text-align: center;
    }

    #popup {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      background: #1e293b;
      padding: 16px 32px;
      border-radius: 80px;
      font-size: 1.6rem;
      font-weight: bold;
      color: white;
      z-index: 1000;
      transition: 0.2s cubic-bezier(0.34, 1.2, 0.64, 1);
      opacity: 0;
      text-align: center;
      box-shadow: 0 20px 35px black;
      pointer-events: none;
      white-space: nowrap;
    }

    #popup.correct {
      background: #10b981;
    }

    #popup.wrong {
      background: #ef4444;
    }

    #popup.show {
      transform: translate(-50%, -50%) scale(1);
      opacity: 1;
      animation: bounce 0.4s ease;
    }

    @keyframes bounce {
      0% {
        transform: translate(-50%, -50%) scale(0.2);
        opacity: 0;
      }
      70% {
        transform: translate(-50%, -50%) scale(1.1);
      }
      100% {
        transform: translate(-50%, -50%) scale(1);
        opacity: 1;
      }
    }

    .leaderboard-entry {
      background: #0f172a;
      margin: 12px 0;
      padding: 12px 20px;
      border-radius: 50px;
      display: flex;
      justify-content: space-between;
      border-left: 6px solid gold;
      transition: 0.2s;
      color: white;
    }

    .leaderboard-entry:hover {
      background: #1e293b;
      transform: translateX(5px);
    }

    .quit-btn {
      background: #4c1d95cc;
      margin-top: 12px;
    }
  </style>
</head>
<body>
<div class="app">
  <h1>🧠 IQ MASTER</h1>

  <!-- MENU -->
  <div id="menuScreen" class="screen active">
    <div class="card">
      <div style="color:white;">📚 Class:
        <select id="classSelect">
          <option>1</option><option>2</option><option>3</option><option>4</option><option>5</option>
          <option>6</option><option>7</option><option>8</option><option>9</option><option>10</option>
        </select>
      </div>
      <div style="color:white;">🎯 Difficulty:
        <select id="difficultySelect">
          <option>Super Easy</option><option>Easy</option><option>Medium</option><option>Hard</option><option>Einstein</option>
        </select>
      </div>
    </div>
    <div class="grid">
      <button id="mcqBtn">📘 MCQ Mode</button>
      <button id="typingBtn">⌨️ Typing Mode</button>
      <button id="infiniteBtn">♾️ Infinite (no repeats)</button>
      <button id="aiBtn">🤖 1v1 AI Battle</button>
    </div>
    <button id="leaderboardBtn">🏆 Leaderboard</button>
  </div>

  <!-- GAME -->
  <div id="gameScreen" class="screen">
    <div class="game-header">
      <span>⭐ <span id="gameScore">0</span></span>
      <span>⏱️ <span id="gameTimer">10</span>s</span>
      <span id="aiBlock" style="display:none;">🤖 AI: <span id="aiScoreVal">0</span></span>
    </div>
    <div class="question-card" id="questionText">Loading...</div>
    <div id="answersArea" class="answers"></div>
    <input type="text" id="typingInput" placeholder="Type your answer..." autocomplete="off">
    <div style="display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;">
      <button id="submitTypingBtn">✓ SUBMIT</button>
      <button id="quitGameBtn" class="quit-btn">🏠 MENU</button>
    </div>
    <div id="qCounter" style="margin-top: 18px; text-align: center; background: #00000033; border-radius: 40px; padding: 8px; color:white;"></div>
  </div>

  <!-- RESULT -->
  <div id="resultScreen" class="screen">
    <h2 style="color:white;">📊 GAME OVER</h2>
    <div id="resultMsg" style="font-size: 1.5rem; margin: 20px; text-align: center; color:white;"></div>
    <button id="playAgainBtn">🔄 PLAY AGAIN</button>
    <button id="leaderboardFromResultBtn">🏆 LEADERBOARD</button>
  </div>

  <!-- LEADERBOARD -->
  <div id="leaderboardScreen" class="screen">
    <h2 style="color:white;">🏅 TOP SCORES</h2>
    <div id="leaderList"></div>
    <button id="backToMenuBtn">◀ BACK</button>
  </div>

  <div id="popup"></div>
</div>

<script>
  // ---------- QUESTION BANK (static) ----------
  const STATIC_QS = [
    { t: "5 + 3 = ?", a: "8", cMin: 1, cMax: 3, diff: "Super Easy", d: ["6", "7", "9"] },
    { t: "12 - 7 = ?", a: "5", cMin: 1, cMax: 3, diff: "Super Easy", d: ["4", "6", "7"] },
    { t: "4 × 6 = ?", a: "24", cMin: 3, cMax: 5, diff: "Easy", d: ["20", "22", "26"] },
    { t: "81 ÷ 9 = ?", a: "9", cMin: 4, cMax: 6, diff: "Easy", d: ["7", "8", "10"] },
    { t: "15% of 200 = ?", a: "30", cMin: 6, cMax: 8, diff: "Medium", d: ["25", "28", "35"] },
    { t: "x + 7 = 15, x = ?", a: "8", cMin: 6, cMax: 8, diff: "Medium", d: ["6", "7", "9"] },
    { t: "√144 = ?", a: "12", cMin: 5, cMax: 7, diff: "Medium", d: ["10", "11", "13"] },
    { t: "2³ × 3² = ?", a: "72", cMin: 7, cMax: 9, diff: "Hard", d: ["64", "68", "80"] },
    { t: "3x = 27, x = ?", a: "9", cMin: 7, cMax: 9, diff: "Hard", d: ["7", "8", "10"] },
    { t: "Derivative of x²?", a: "2x", cMin: 9, cMax: 10, diff: "Einstein", d: ["x", "2", "x²"] },
    { t: "Capital of France?", a: "Paris", cMin: 2, cMax: 10, diff: "Easy", d: ["London", "Berlin", "Madrid"] },
    { t: "Largest mammal?", a: "Whale", cMin: 2, cMax: 10, diff: "Super Easy", d: ["Elephant", "Giraffe", "Hippo"] },
    { t: "Who painted Mona Lisa?", a: "Da Vinci", cMin: 5, cMax: 10, diff: "Medium", d: ["Van Gogh", "Picasso", "Rembrandt"] },
    { t: "Longest river?", a: "Nile", cMin: 5, cMax: 10, diff: "Medium", d: ["Amazon", "Yangtze", "Mississippi"] },
    { t: "Statue of Liberty gift from?", a: "France", cMin: 6, cMax: 10, diff: "Hard", d: ["England", "Spain", "Germany"] },
    { t: "Gas plants release?", a: "Oxygen", cMin: 3, cMax: 10, diff: "Easy", d: ["CO2", "Nitrogen", "Hydrogen"] },
    { t: "Hardest natural substance?", a: "Diamond", cMin: 4, cMax: 10, diff: "Easy", d: ["Gold", "Iron", "Platinum"] },
    { t: "pH of pure water?", a: "7", cMin: 6, cMax: 10, diff: "Medium", d: ["5", "6", "8"] },
    { t: "Pumps blood?", a: "Heart", cMin: 3, cMax: 10, diff: "Super Easy", d: ["Liver", "Brain", "Lungs"] },
    { t: "Symbol for Gold?", a: "Au", cMin: 6, cMax: 10, diff: "Hard", d: ["Ag", "Fe", "Pb"] },
    { t: "Has keys but no locks?", a: "Piano", cMin: 2, cMax: 10, diff: "Medium", d: ["Keyboard", "Door", "Chest"] },
    { t: "Speaks without mouth?", a: "Echo", cMin: 4, cMax: 10, diff: "Hard", d: ["Shadow", "Wind", "Mirror"] }
  ];

  // Dynamic math generator
  function generateMath(classLevel, difficulty) {
    let low = 1, high = 20, ops = ['+'];
    if (classLevel >= 7) high = 150;
    else if (classLevel >= 5) high = 100;
    else if (classLevel >= 3) high = 50;
    if (difficulty === "Super Easy") ops = ['+'];
    else if (difficulty === "Easy") ops = ['+', '-'];
    else if (difficulty === "Medium") { ops = ['+', '-', '*']; high = Math.min(high + 30, 200); }
    else if (difficulty === "Hard") { ops = ['+', '-', '*', '/']; high = Math.min(high + 70, 400); }
    else if (difficulty === "Einstein") { ops = ['*', '/', '^2']; high = 500; }

    let op = ops[Math.floor(Math.random() * ops.length)];
    let a = Math.floor(Math.random() * (high - low + 1) + low);
    let b = Math.floor(Math.random() * (high / 2) + 1);
    let text, answer;

    if (op === '^2') {
      let base = Math.floor(Math.random() * 15 + 2);
      answer = String(base * base);
      text = `${base}² = ?`;
    } else if (op === '/') {
      b = Math.max(1, b);
      let product = a * b;
      answer = String(a);
      text = `${product} ÷ ${b} = ?`;
    } else if (op === '*') {
      answer = String(a * b);
      text = `${a} × ${b} = ?`;
    } else {
      let result = op === '+' ? a + b : a - b;
      if (result < 0) { let t = a; a = b; b = t; result = a - b; }
      answer = String(result);
      text = `${a} ${op} ${b} = ?`;
    }
    let num = parseFloat(answer);
    let d1 = String(num + 1);
    let d2 = String(num - 1);
    if (d1 === answer) d1 = String(num + 2);
    if (d2 === answer) d2 = String(num - 2);
    return { text, answer: answer.toLowerCase(), distractors: [d1, d2] };
  }

  function filterStatic(classLevel, difficulty) {
    return STATIC_QS.filter(q =>
      classLevel >= q.cMin && classLevel <= q.cMax &&
      (q.diff === difficulty || (difficulty === "Einstein" && q.diff === "Hard"))
    );
  }

  // ---------- GAME STATE ----------
  let mode = null;
  let classLevel = 5;
  let difficulty = "Medium";
  let score = 0;
  let aiScore = 0;
  let qIndex = 0;
  let totalRounds = 5;
  let timer = null;
  let timeLeft = 10;
  let active = false;
  let currentQ = null;
  let usedQuestions = new Set();   // tracks used questions in current session (all modes)
  let staticPool = [];

  // Helper functions
  function showPopup(msg, type) {
    const pop = document.getElementById('popup');
    pop.innerText = msg;
    pop.className = type + ' show';
    setTimeout(() => pop.className = '', 1800);
  }

  function updateUI() {
    document.getElementById('gameScore').innerText = score;
    if (mode === 'ai') document.getElementById('aiScoreVal').innerText = aiScore;
  }

  function saveHighScore(finalScore) {
    let scores = JSON.parse(localStorage.getItem('iqMasterScores')) || [];
    scores.push({ score: finalScore, date: new Date().toLocaleDateString(), mode: mode });
    scores.sort((a, b) => b.score - a.score);
    scores = scores.slice(0, 8);
    localStorage.setItem('iqMasterScores', JSON.stringify(scores));
  }

  function endGame() {
    active = false;
    if (timer) clearInterval(timer);
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('resultScreen').classList.add('active');
    let iq = Math.min(160, 80 + score * 12);
    let msg = `🧠 Score: ${score}  |  IQ: ${iq}`;
    if (mode === 'ai') {
      msg += `<br>🤖 AI: ${aiScore}  |  ${score > aiScore ? '🏆 YOU WIN!' : (score === aiScore ? '🤝 DRAW' : '💀 AI WINS')}`;
    }
    document.getElementById('resultMsg').innerHTML = msg;
    saveHighScore(score);
  }

  // Returns a new question not used in this session (if possible)
  function getFreshQuestion() {
    let useDynamic = (Math.random() < 0.3) || (staticPool.length === 0);
    let q;
    if (useDynamic) {
      q = generateMath(classLevel, difficulty);
      q.answer = q.answer.toLowerCase();
      // For dynamic questions, we don't track repeats because they are virtually infinite
      // But we still need to ensure that in infinite mode we don't repeat dynamic ones? They are random so unlikely.
    } else {
      // Available static questions that haven't been used yet
      let available = staticPool.filter(qq => !usedQuestions.has(qq.t));
      if (available.length === 0) {
        // If all static questions have been used, reset the used set (only for infinite mode; for other modes we just pick any)
        if (mode === 'infinite') {
          usedQuestions.clear();
          available = [...staticPool];
        } else {
          // For non-infinite modes (5 rounds), if we somehow run out (unlikely because we have many questions), just pick any
          available = [...staticPool];
        }
      }
      let picked = available.length ? available[Math.floor(Math.random() * available.length)] : staticPool[0];
      q = {
        text: picked.t,
        answer: picked.a.toLowerCase(),
        distractors: picked.d
      };
      // Mark as used for this session (applies to all modes to prevent repeats within the same game)
      usedQuestions.add(q.text);
    }
    // Build MCQ options if needed
    if (mode === 'mcq') {
      let opts = [q.answer, ...(q.distractors || ["tmp1", "tmp2"])];
      opts = opts.slice(0, 3);
      for (let i = opts.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [opts[i], opts[j]] = [opts[j], opts[i]];
      }
      q.options = opts;
    }
    return q;
  }

  function nextQuestion() {
    if (!active) return;
    if (mode !== 'infinite' && qIndex >= totalRounds) {
      endGame();
      return;
    }

    currentQ = getFreshQuestion();
    document.getElementById('questionText').innerText = currentQ.text;
    const container = document.getElementById('answersArea');
    const typingInp = document.getElementById('typingInput');

    if (mode === 'mcq' && currentQ.options) {
      container.innerHTML = '';
      typingInp.style.display = 'none';
      document.getElementById('submitTypingBtn').style.display = 'none';
      currentQ.options.forEach(opt => {
        let btn = document.createElement('button');
        btn.innerText = opt;
        btn.onclick = () => checkAnswer(opt);
        container.appendChild(btn);
      });
    } else if (mode === 'typing') {
      container.innerHTML = '';
      typingInp.style.display = 'block';
      typingInp.value = '';
      typingInp.focus();
      document.getElementById('submitTypingBtn').style.display = 'inline-block';
      // Replace listener to avoid duplicates
      const submitBtn = document.getElementById('submitTypingBtn');
      const newSubmit = submitBtn.cloneNode(true);
      submitBtn.parentNode.replaceChild(newSubmit, submitBtn);
      newSubmit.onclick = () => {
        checkAnswer(typingInp.value.trim());
      };
    } else {
      container.innerHTML = '';
      typingInp.style.display = 'none';
      document.getElementById('submitTypingBtn').style.display = 'none';
      let opts = [currentQ.answer, ...(currentQ.distractors || ["opt1", "opt2"])];
      opts = opts.slice(0, 3);
      for (let i = opts.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [opts[i], opts[j]] = [opts[j], opts[i]];
      }
      opts.forEach(opt => {
        let btn = document.createElement('button');
        btn.innerText = opt;
        btn.onclick = () => checkAnswer(opt);
        container.appendChild(btn);
      });
    }

    const counterText = (mode === 'infinite') ? `🔁 Round ${qIndex + 1} (no repeats)` : `📌 Q${qIndex + 1}/${totalRounds}`;
    document.getElementById('qCounter').innerHTML = counterText;
    startTimer();
  }

  function startTimer() {
    if (timer) clearInterval(timer);
    timeLeft = 10;
    document.getElementById('gameTimer').innerText = timeLeft;
    timer = setInterval(() => {
      if (!active) return;
      timeLeft--;
      document.getElementById('gameTimer').innerText = timeLeft >= 0 ? timeLeft : 0;
      if (timeLeft <= 0) {
        clearInterval(timer);
        if (mode === 'ai') {
          aiScore++;
          document.getElementById('aiScoreVal').innerText = aiScore;
        }
        showPopup(`⏰ Timeout! Answer: ${currentQ.answer}`, 'wrong');
        qIndex++;
        updateUI();
        nextQuestion();
      }
    }, 1000);
  }

  function checkAnswer(userAns) {
    if (!active) return;
    clearInterval(timer);
    const isCorrect = (userAns.toLowerCase().trim() === currentQ.answer);
    if (isCorrect) {
      score++;
      showPopup("✅ Correct!", "correct");
    } else {
      if (mode === 'ai') {
        aiScore++;
        document.getElementById('aiScoreVal').innerText = aiScore;
      }
      showPopup(`❌ Wrong! Answer: ${currentQ.answer}`, "wrong");
    }
    qIndex++;
    updateUI();
    nextQuestion();
  }

  function startGame(selectedMode) {
    mode = selectedMode;
    classLevel = parseInt(document.getElementById('classSelect').value);
    difficulty = document.getElementById('difficultySelect').value;
    score = 0;
    aiScore = 0;
    qIndex = 0;
    totalRounds = (mode === 'infinite') ? Infinity : 5;
    active = true;
    usedQuestions.clear();  // reset used questions for new game session
    staticPool = filterStatic(classLevel, difficulty);

    document.getElementById('gameScore').innerText = "0";
    document.getElementById('gameTimer').innerText = "10";
    const aiBlock = document.getElementById('aiBlock');
    if (mode === 'ai') {
      aiBlock.style.display = 'flex';
      document.getElementById('aiScoreVal').innerText = "0";
    } else {
      aiBlock.style.display = 'none';
    }

    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('gameScreen').classList.add('active');
    document.getElementById('typingInput').style.display = (mode === 'typing') ? 'block' : 'none';
    document.getElementById('submitTypingBtn').style.display = (mode === 'typing') ? 'inline-block' : 'none';
    document.getElementById('answersArea').innerHTML = '';
    if (timer) clearInterval(timer);
    nextQuestion();
  }

  function quitGame() {
    active = false;
    if (timer) clearInterval(timer);
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('menuScreen').classList.add('active');
  }

  function showLeaderboard() {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('leaderboardScreen').classList.add('active');
    const listDiv = document.getElementById('leaderList');
    let scores = JSON.parse(localStorage.getItem('iqMasterScores')) || [];
    if (scores.length === 0) {
      listDiv.innerHTML = '<div class="leaderboard-entry">✨ No scores yet. Play a game!</div>';
      return;
    }
    listDiv.innerHTML = '';
    scores.forEach((entry, idx) => {
      const div = document.createElement('div');
      div.className = 'leaderboard-entry';
      div.innerHTML = `<span>#${idx + 1} ⭐ ${entry.score}</span><span>${entry.mode} • ${entry.date}</span>`;
      listDiv.appendChild(div);
    });
  }

  function backToMenu() {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('menuScreen').classList.add('active');
  }

  // ----- Attach event listeners -----
  document.getElementById('mcqBtn').onclick = () => startGame('mcq');
  document.getElementById('typingBtn').onclick = () => startGame('typing');
  document.getElementById('infiniteBtn').onclick = () => startGame('infinite');
  document.getElementById('aiBtn').onclick = () => startGame('ai');
  document.getElementById('leaderboardBtn').onclick = showLeaderboard;
  document.getElementById('quitGameBtn').onclick = quitGame;
  document.getElementById('playAgainBtn').onclick = () => backToMenu();
  document.getElementById('leaderboardFromResultBtn').onclick = showLeaderboard;
  document.getElementById('backToMenuBtn').onclick = backToMenu;

  // Register service worker if present
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js').catch(err => console.log("SW error:", err));
    });
  }
</script>
</body>
</html>
