<!DOCTYPE html>
<html>
<head>
<link rel="manifest" href="manifest.json">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IQ Master</title>

<style>
body {
  margin:0;
  font-family:Arial;
  text-align:center;
  color:white;
  background: linear-gradient(135deg,#020617,#0ea5e9);
}

h1 { margin-top:20px; }

button {
  padding:15px;
  margin:10px;
  border:none;
  border-radius:10px;
  background:#0ea5e9;
  color:white;
  width:80%;
  font-size:16px;
}

.screen { display:none; }
.active { display:block; }

#timer {
  font-size:20px;
  margin:10px;
}

input {
  padding:10px;
  width:70%;
  border-radius:8px;
  border:none;
}
</style>
</head>

<body>

<h1>🧠 IQ Master</h1>

<div id="menu" class="screen active">
  <button onclick="startGame('mcq')">MCQ Mode</button>
  <button onclick="startGame('typing')">Typing Mode</button>
</div>

<div id="game" class="screen">
  <div id="timer">10</div>
  <h2 id="question"></h2>
  <div id="answers"></div>
  <input id="inputAnswer" placeholder="Type answer..." style="display:none">
  <br>
  <button onclick="submitAnswer()">Submit</button>
</div>

<div id="result" class="screen">
  <h2 id="scoreText"></h2>
  <button onclick="location.reload()">Play Again</button>
</div>

<script>
try {

let mode = "mcq";
let score = 0;
let current = 0;
let timer;
let timeLeft = 10;

const questions = [
  {q:"2+2=?", a:"4", o:["3","4","5"]},
  {q:"5×3=?", a:"15", o:["10","15","20"]},
  {q:"Capital of France?", a:"Paris", o:["Rome","Paris","Berlin"]},
  {q:"10/2=?", a:"5", o:["2","5","8"]}
];

window.startGame = function(m){
  mode = m;
  document.getElementById("menu").classList.remove("active");
  document.getElementById("game").classList.add("active");
  loadQuestion();
}

function loadQuestion(){
  if(current >= questions.length){
    endGame();
    return;
  }

  let q = questions[current];
  document.getElementById("question").innerText = q.q;

  let ansDiv = document.getElementById("answers");
  ansDiv.innerHTML = "";

  if(mode === "mcq"){
    document.getElementById("inputAnswer").style.display = "none";

    q.o.forEach(opt=>{
      let btn = document.createElement("button");
      btn.innerText = opt;
      btn.onclick = function(){ check(opt); };
      ansDiv.appendChild(btn);
    });

  } else {
    document.getElementById("inputAnswer").style.display = "block";
  }

  startTimer();
}

function startTimer(){
  timeLeft = 10;
  document.getElementById("timer").innerText = timeLeft;

  clearInterval(timer);
  timer = setInterval(()=>{
    timeLeft--;
    document.getElementById("timer").innerText = timeLeft;

    if(timeLeft <= 0){
      current++;
      loadQuestion();
    }
  },1000);
}

function check(ans){
  if(ans === questions[current].a){
    score++;
  }
  current++;
  loadQuestion();
}

window.submitAnswer = function(){
  let val = document.getElementById("inputAnswer").value;

  if(val.toLowerCase() === questions[current].a.toLowerCase()){
    score++;
  }

  current++;
  loadQuestion();
}

function endGame(){
  clearInterval(timer);

  document.getElementById("game").classList.remove("active");
  document.getElementById("result").classList.add("active");

  let iq = 90 + score * 10;

  document.getElementById("scoreText").innerText =
    "Score: " + score + " | IQ: " + iq;
}

} catch(e) {
  document.body.innerHTML = "<h1>Error: "+e.message+"</h1>";
}
</script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>
</body>
</html>
