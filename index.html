<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IQ Master</title>
  <link rel="manifest" href="manifest.json">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{min-height:100vh;background:linear-gradient(135deg,#0a0f2a,#020617,#1e1b4b);background-size:200% 200%;animation:grad 12s infinite;font-family:system-ui,sans-serif;display:flex;justify-content:center;align-items:center;padding:20px;}
    @keyframes grad{0%{background-position:0% 50%;}50%{background-position:100% 50%;}100%{background-position:0% 50%;}}
    .container{max-width:650px;width:100%;background:#0f172aee;border-radius:48px;border:1px solid #38bdf8;padding:28px 24px;transition:transform 0.2s;}
    .container:hover{transform:scale(1.01);}
    h1{font-size:2rem;text-align:center;background:linear-gradient(135deg,#fff,#7dd3fc,#c084fc);-webkit-background-clip:text;background-clip:text;color:transparent;margin-bottom:20px;}
    .screen{display:none;animation:fade 0.3s;}
    .active{display:block;}
    @keyframes fade{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
    .card{background:#ffffff0d;border-radius:32px;padding:20px;margin:20px 0;}
    select,button,input{background:#0f172a;border:1px solid #38bdf8;border-radius:60px;padding:10px 18px;font-size:1rem;color:white;cursor:pointer;transition:0.2s;margin:6px;}
    button{background:#0c4e6e;border:none;box-shadow:0 4px 10px rgba(0,0,0,0.3);}
    button:hover,select:hover{transform:translateY(-2px);border-color:#f0abfc;}
    .grid{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;margin:10px 0;}
    .grid button{flex:1 1 40%;min-width:130px;background:#1e293b;border-left:4px solid #38bdf8;}
    .game-header{display:flex;justify-content:space-between;background:#00000066;border-radius:60px;padding:12px 20px;margin-bottom:20px;font-weight:bold;}
    .question-card{background:#0a0f1e;border-radius:48px;padding:32px 16px;text-align:center;font-size:1.8rem;font-weight:bold;margin:20px 0;color:white;border:1px solid #38bdf8;}
    .answers{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;margin:20px 0;}
    .answers button{flex:1 1 42%;font-size:1.2rem;}
    #typingInput{width:85%;text-align:center;}
    #popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);background:#1e293b;padding:16px 32px;border-radius:80px;font-size:1.6rem;font-weight:bold;color:white;z-index:1000;transition:0.2s;opacity:0;white-space:nowrap;}
    #popup.correct{background:#10b981;}
    #popup.wrong{background:#ef4444;}
    #popup.show{transform:translate(-50%,-50%) scale(1);opacity:1;animation:pop 0.3s;}
    @keyframes pop{0%{transform:translate(-50%,-50%) scale(0.2);opacity:0;}80%{transform:translate(-50%,-50%) scale(1.1);}100%{transform:translate(-50%,-50%) scale(1);opacity:1;}}
    .leaderboard-entry{background:#0f172a;margin:12px 0;padding:12px 20px;border-radius:50px;display:flex;justify-content:space-between;border-left:6px solid gold;}
    .quit-btn{background:#4c1d95cc;margin-top:12px;}
  </style>
</head>
<body>
<div class="container">
<h1>🧠 IQ MASTER</h1>
<div id="menu" class="screen active">
<div class="card">
<div>📚 Class: <select id="class"><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option><option>6</option><option>7</option><option>8</option><option>9</option><option>10</option></select></div>
<div>🎯 Difficulty: <select id="diff"><option>Super Easy</option><option>Easy</option><option>Medium</option><option>Hard</option><option>Einstein</option></select></div>
</div>
<div class="grid"><button onclick="start('mcq')">📘 MCQ</button><button onclick="start('typing')">⌨️ Typing</button><button onclick="start('infinite')">♾️ Infinite</button><button onclick="start('ai')">🤖 AI Battle</button></div>
<button onclick="showLeaderboard()">🏆 Leaderboard</button>
</div>
<div id="game" class="screen">
<div class="game-header"><span>⭐ <span id="score">0</span></span><span>⏱️ <span id="timer">10</span>s</span><span id="aiBlock" style="display:none;">🤖 AI: <span id="aiScore">0</span></span></div>
<div class="question-card" id="qText">Loading...</div>
<div id="answers" class="answers"></div>
<input type="text" id="typingInput" placeholder="Type answer..." autocomplete="off">
<div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;"><button id="submitBtn">✓ SUBMIT</button><button class="quit-btn" onclick="quit()">🏠 MENU</button></div>
<div id="counter" style="margin-top:18px;text-align:center;background:#00000033;border-radius:40px;padding:8px;"></div>
</div>
<div id="result" class="screen"><h2>GAME OVER</h2><div id="resultMsg" style="font-size:1.5rem;margin:20px;"></div><button onclick="resetMenu()">🔄 PLAY AGAIN</button><button onclick="showLeaderboard()">🏆 LEADERBOARD</button></div>
<div id="leader" class="screen"><h2>🏅 TOP SCORES</h2><div id="leaderList"></div><button onclick="backToMenu()">◀ BACK</button></div>
<div id="popup"></div>
</div>
<script>
const staticQs=[{t:"5+3=?",a:"8",cMin:1,cMax:3,diff:"Super Easy",d:["6","7","9"]},{t:"12-7=?",a:"5",cMin:1,cMax:3,diff:"Super Easy",d:["4","6","7"]},{t:"4×6=?",a:"24",cMin:3,cMax:5,diff:"Easy",d:["20","22","26"]},{t:"81÷9=?",a:"9",cMin:4,cMax:6,diff:"Easy",d:["7","8","10"]},{t:"15% of 200=?",a:"30",cMin:6,cMax:8,diff:"Medium",d:["25","28","35"]},{t:"x+7=15,x=?",a:"8",cMin:6,cMax:8,diff:"Medium",d:["6","7","9"]},{t:"√144=?",a:"12",cMin:5,cMax:7,diff:"Medium",d:["10","11","13"]},{t:"2³×3²=?",a:"72",cMin:7,cMax:9,diff:"Hard",d:["64","68","80"]},{t:"3x=27,x=?",a:"9",cMin:7,cMax:9,diff:"Hard",d:["7","8","10"]},{t:"Derivative of x²?",a:"2x",cMin:9,cMax:10,diff:"Einstein",d:["x","2","x²"]},{t:"Capital of France?",a:"Paris",cMin:2,cMax:10,diff:"Easy",d:["London","Berlin","Madrid"]},{t:"Largest mammal?",a:"Whale",cMin:2,cMax:10,diff:"Super Easy",d:["Elephant","Giraffe","Hippo"]},{t:"Who painted Mona Lisa?",a:"Da Vinci",cMin:5,cMax:10,diff:"Medium",d:["Van Gogh","Picasso","Rembrandt"]},{t:"Longest river?",a:"Nile",cMin:5,cMax:10,diff:"Medium",d:["Amazon","Yangtze","Mississippi"]},{t:"Statue of Liberty gift from?",a:"France",cMin:6,cMax:10,diff:"Hard",d:["England","Spain","Germany"]},{t:"Gas plants release?",a:"Oxygen",cMin:3,cMax:10,diff:"Easy",d:["CO2","Nitrogen","Hydrogen"]},{t:"Hardest natural substance?",a:"Diamond",cMin:4,cMax:10,diff:"Easy",d:["Gold","Iron","Platinum"]},{t:"pH of pure water?",a:"7",cMin:6,cMax:10,diff:"Medium",d:["5","6","8"]},{t:"Pumps blood?",a:"Heart",cMin:3,cMax:10,diff:"Super Easy",d:["Liver","Brain","Lungs"]},{t:"Symbol for Gold?",a:"Au",cMin:6,cMax:10,diff:"Hard",d:["Ag","Fe","Pb"]},{t:"Has keys but no locks?",a:"Piano",cMin:2,cMax:10,diff:"Medium",d:["Keyboard","Door","Chest"]},{t:"Speaks without mouth?",a:"Echo",cMin:4,cMax:10,diff:"Hard",d:["Shadow","Wind","Mirror"]}];
function genMath(cLvl,diff){let low=1,high=20,ops=['+'];if(cLvl>=7)high=150;else if(cLvl>=5)high=100;else if(cLvl>=3)high=50;if(diff==="Super Easy")ops=['+'];else if(diff==="Easy")ops=['+','-'];else if(diff==="Medium"){ops=['+','-','*'];high=Math.min(high+30,200);}else if(diff==="Hard"){ops=['+','-','*','/'];high=Math.min(high+70,400);}else if(diff==="Einstein"){ops=['*','/','^2'];high=500;}let op=ops[Math.floor(Math.random()*ops.length)],a=Math.floor(Math.random()*(high-low+1)+low),b=Math.floor(Math.random()*(high/2)+1),text,ans;if(op==='^2'){let base=Math.floor(Math.random()*15+2);ans=String(base*base);text=`${base}²=?`;}else if(op==='/'){b=Math.max(1,b);let prod=a*b;ans=String(a);text=`${prod}÷${b}=?`;}else if(op==='*'){ans=String(a*b);text=`${a}×${b}=?`;}else{let res=op==='+'?a+b:a-b;if(res<0){let t=a;a=b;b=t;res=a-b;}ans=String(res);text=`${a} ${op} ${b}=?`;}let num=parseFloat(ans),d1=String(num+1),d2=String(num-1);if(d1===ans)d1=String(num+2);if(d2===ans)d2=String(num-2);return{text,answer:ans.toLowerCase(),distractors:[d1,d2]};}
let mode,classLevel=5,difficulty="Medium",score=0,aiScore=0,qIndex=0,totalRounds=5,timer,timeLeft=10,active=false,currentQ=null,used=new Set(),staticPool=[];
function filterStatic(c,d){return staticQs.filter(q=>c>=q.cMin&&c<=q.cMax&&(q.diff===d||(d==="Einstein"&&q.diff==="Hard")));}
function freshQ(){let useDynamic=Math.random()<0.3||staticPool.length===0,q;if(useDynamic){q=genMath(classLevel,difficulty);q.answer=q.answer.toLowerCase();}else{let avail=staticPool.filter(qq=>!used.has(qq.t));if(avail.length===0&&mode==='infinite'){used.clear();avail=[...staticPool];}let picked=avail.length?avail[Math.floor(Math.random()*avail.length)]:staticPool[0];q={text:picked.t,answer:picked.a.toLowerCase(),distractors:picked.d};if(mode==='infinite')used.add(q.text);}if(mode==='mcq'){let opts=[q.answer,...(q.distractors||["x","y"])];opts=opts.slice(0,3);for(let i=opts.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[opts[i],opts[j]]=[opts[j],opts[i]];}q.options=opts;}return q;}
function nextQ(){if(!active)return;if(mode!=='infinite'&&qIndex>=totalRounds){endGame();return;}currentQ=freshQ();document.getElementById('qText').innerText=currentQ.text;let container=document.getElementById('answers'),typingInp=document.getElementById('typingInput');if(mode==='mcq'&&currentQ.options){container.innerHTML='';typingInp.style.display='none';document.getElementById('submitBtn').style.display='none';currentQ.options.forEach(opt=>{let btn=document.createElement('button');btn.innerText=opt;btn.onclick=()=>check(opt);container.appendChild(btn);});}else if(mode==='typing'){container.innerHTML='';typingInp.style.display='block';typingInp.value='';typingInp.focus();document.getElementById('submitBtn').style.display='inline-block';document.getElementById('submitBtn').onclick=()=>check(typingInp.value.trim());}else{container.innerHTML='';typingInp.style.display='none';document.getElementById('submitBtn').style.display='none';let opts=[currentQ.answer,...(currentQ.distractors||["a","b"])];opts=opts.slice(0,3);for(let i=opts.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[opts[i],opts[j]]=[opts[j],opts[i]];}opts.forEach(opt=>{let btn=document.createElement('button');btn.innerText=opt;btn.onclick=()=>check(opt);container.appendChild(btn);});}let counterText=(mode==='infinite')?`🔁 Round ${qIndex+1} (no repeats)`:`📌 Q${qIndex+1}/${totalRounds}`;document.getElementById('counter').innerHTML=counterText;startTimer();}
function startTimer(){if(timer)clearInterval(timer);timeLeft=10;document.getElementById('timer').innerText=timeLeft;timer=setInterval(()=>{if(!active)return;timeLeft--;document.getElementById('timer').innerText=timeLeft>=0?timeLeft:0;if(timeLeft<=0){clearInterval(timer);if(mode==='ai'){aiScore++;document.getElementById('aiScore').innerText=aiScore;}showPopup(`⏰ Timeout! Answer: ${currentQ.answer}`,'wrong');qIndex++;updateUI();nextQ();}},1000);}
function check(ans){if(!active)return;clearInterval(timer);let isCorrect=(ans.toLowerCase().trim()===currentQ.answer);if(isCorrect){score++;showPopup("✅ Correct!",'correct');}else{if(mode==='ai'){aiScore++;document.getElementById('aiScore').innerText=aiScore;}showPopup(`❌ Wrong! Answer: ${currentQ.answer}`,'wrong');}qIndex++;updateUI();nextQ();}
function updateUI(){document.getElementById('score').innerText=score;if(mode==='ai')document.getElementById('aiScore').innerText=aiScore;}
function endGame(){active=false;clearInterval(timer);document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById('result').classList.add('active');let iq=Math.min(160,80+score*12),msg=`🧠 Score: ${score}  |  IQ: ${iq}`;if(mode==='ai')msg+=`<br>🤖 AI: ${aiScore}  |  ${score>aiScore?'🏆 YOU WIN!':(score===aiScore?'🤝 DRAW':'💀 AI WINS')}`;document.getElementById('resultMsg').innerHTML=msg;saveScore(score);}
function saveScore(s){let arr=JSON.parse(localStorage.getItem('iqScores'))||[];arr.push({score:s,date:new Date().toLocaleDateString(),mode:mode});arr.sort((a,b)=>b.score-a.score);arr=arr.slice(0,8);localStorage.setItem('iqScores',JSON.stringify(arr));}
function start(m){mode=m;classLevel=parseInt(document.getElementById('class').value);difficulty=document.getElementById('diff').value;score=0;aiScore=0;qIndex=0;totalRounds=(m==='infinite')?Infinity:5;active=true;used.clear();staticPool=filterStatic(classLevel,difficulty);document.getElementById('score').innerText="0";document.getElementById('timer').innerText="10";let aiBlock=document.getElementById('aiBlock');if(m==='ai'){aiBlock.style.display='flex';document.getElementById('aiScore').innerText="0";}else aiBlock.style.display='none';document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById('game').classList.add('active');document.getElementById('typingInput').style.display=(m==='typing')?'block':'none';document.getElementById('submitBtn').style.display=(m==='typing')?'inline-block':'none';document.getElementById('answers').innerHTML='';if(timer)clearInterval(timer);nextQ();}
function quit(){active=false;clearInterval(timer);resetMenu();}
function resetMenu(){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById('menu').classList.add('active');}
function showPopup(msg,type){let pop=document.getElementById('popup');pop.innerText=msg;pop.className=type+' show';setTimeout(()=>pop.className='',1800);}
function showLeaderboard(){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById('leader').classList.add('active');let listDiv=document.getElementById('leaderList');let scores=JSON.parse(localStorage.getItem('iqScores'))||[];if(scores.length===0){listDiv.innerHTML='<div class="leaderboard-entry">✨ No scores yet. Play a game!</div>';return;}listDiv.innerHTML='';scores.forEach((e,i)=>{let div=document.createElement('div');div.className='leaderboard-entry';div.innerHTML=`<span>#${i+1} ⭐ ${e.score}</span><span>${e.mode} • ${e.date}</span>`;listDiv.appendChild(div);});}
function backToMenu(){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById('menu').classList.add('active');}
if('serviceWorker' in navigator){window.addEventListener('load',()=>{navigator.serviceWorker.register('./sw.js').catch(e=>console.log("SW error",e));});}
</script>
</body>
</html>
